<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reserva tu cita en BeautyBox Málaga - Especialistas en extensiones de pestañas, diseño de cejas y tratamientos de belleza">
    <title>Reservar Cita | BeautyBox Málaga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #d4a5a5;
            --secondary-color: #1a1a1a;
            --accent-color: #c48b9f;
            --light-bg: #f9f7f5;
            --white: #fff;
            --text-dark: #2c2c2c;
            --text-light: #666;
            --success-color: #4caf50;
            --error-color: #f44336;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--light-bg) 0%, #fff 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: var(--transition);
        }
        
        .back-link:hover {
            gap: 0.8rem;
            color: var(--accent-color);
        }
        
        .form-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .form-header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 3rem 2rem;
            text-align: center;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }
        
        .form-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .form-header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .form-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }
        
        .form-header p {
            font-size: 1.1rem;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }
        
        .form-body {
            padding: 3rem 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        
        .form-group label .required {
            color: var(--error-color);
            margin-left: 0.2rem;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--light-bg);
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--white);
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(212, 165, 165, 0.1);
        }
        
        .form-group input::placeholder {
            color: #aaa;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .info-box {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary-color);
        }
        
        .info-box p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin: 0;
        }
        
        .submit-btn {
            width: 100%;
            background: var(--primary-color);
            color: var(--white);
            padding: 1.2rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .submit-btn:hover:not(:disabled) {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(196, 139, 159, 0.4);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        
        .submit-btn.loading .loading-spinner {
            display: block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .message-box {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .message-box.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid var(--success-color);
        }
        
        .message-box.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid var(--error-color);
        }
        
        .message-box.show {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .service-price {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }
            
            .form-header h1 {
                font-size: 2rem;
            }
            
            .form-header p {
                font-size: 1rem;
            }
            
            .form-body {
                padding: 2rem 1.5rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
        
        <div class="form-card">
            <div class="form-header">
                <h1>Reserva tu Cita</h1>
                <p>Completa el formulario y nos pondremos en contacto contigo</p>
            </div>
            
            <div class="form-body">
                <div class="message-box" id="messageBox"></div>
                
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="name">Nombre completo<span class="required">*</span></label>
                        <input type="text" id="name" name="name" placeholder="Ej: María García López" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Teléfono<span class="required">*</span></label>
                            <input type="tel" id="phone" name="phone" placeholder="Ej: 642 84 19 32" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email<span class="required">*</span></label>
                            <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="service">Servicio<span class="required">*</span></label>
                        <select id="service" name="service" required>
                            <option value="">-- Selecciona un servicio --</option>
                            <option value="Extensiones de pestañas clásicas" data-price="50">Extensiones de pestañas clásicas - 50€</option>
                            <option value="Extensiones de Pestañas 2D" data-price="65">Extensiones de Pestañas 2D - 65€</option>
                            <option value="Extensiones de Pestañas Híbridas" data-price="55">Extensiones de Pestañas Híbridas - 55€</option>
                            <option value="Extensiones de Pestañas 3D" data-price="80">Extensiones de Pestañas 3D - 80€</option>
                            <option value="Extensiones Volumen Ruso" data-price="80">Extensiones Volumen Ruso - 80€</option>
                            <option value="Lifting de Pestañas con tinte" data-price="50">Lifting de Pestañas con tinte - 50€</option>
                            <option value="Microblading o Nanoblading" data-price="200">Microblading o Nanoblading - 200€</option>
                            <option value="Micropigmentación de Cejas" data-price="250">Micropigmentación de Cejas - 250€</option>
                            <option value="Laminado de Cejas" data-price="45">Laminado de Cejas - 45€</option>
                            <option value="Diseño de Cejas con Henna" data-price="35">Diseño de Cejas con Henna - 35€</option>
                            <option value="Depilación con hilo" data-price="10">Depilación con hilo - 10€</option>
                            <option value="Micropigmentación de Labios" data-price="280">Micropigmentación de Labios - 280€</option>
                            <option value="Micropigmentación de Ojos" data-price="220">Micropigmentación de Ojos - 220€</option>
                            <option value="Manicura Rusa con Nivelación" data-price="25">Manicura Rusa con Nivelación - 25€</option>
                        </select>
                        <div class="service-price" id="servicePrice"></div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Fecha preferida<span class="required">*</span></label>
                            <input type="date" id="date" name="date" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="time">Hora preferida<span class="required">*</span></label>
                            <select id="time" name="time" required>
                                <option value="">-- Selecciona primero la fecha --</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="info-box">
                        <p><i class="fas fa-info-circle"></i> <strong>Horario:</strong> Lunes-Viernes: 10:00-20:00 | Sábado: 10:00-14:00 | Domingo: Cerrado</p>
                        <p style="margin-top: 0.5rem;"><i class="fas fa-info-circle"></i> <strong>Nota:</strong> Esta es una solicitud de cita. Te confirmaremos la disponibilidad por WhatsApp o teléfono.</p>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Enviar Solicitud</span>
                        <div class="loading-spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Configuración
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyryzEEQsJfolNYao-h4fxSmeZa0yupOhh-8vdjdD7wyfgtd5AZSR50A3wJwG0uJPJtOw/exec';
        
        // Elementos del DOM
        const form = document.getElementById('bookingForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        const serviceSelect = document.getElementById('service');
        const servicePriceDiv = document.getElementById('servicePrice');
        const dateInput = document.getElementById('date');
        
        // Mostrar precio del servicio seleccionado
        serviceSelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const price = selectedOption.getAttribute('data-price');
            
            if (price) {
                servicePriceDiv.textContent = `Precio: ${price}€`;
                servicePriceDiv.style.display = 'block';
            } else {
                servicePriceDiv.style.display = 'none';
            }
        });
        
        // Establecer fecha mínima (hoy)
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);
        
        // Horarios según el día
        const weekdayHours = ['10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00'];
        const saturdayHours = ['10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00'];
        
        // Actualizar horarios cuando se selecciona una fecha
        dateInput.addEventListener('change', function() {
            const selectedDate = new Date(this.value + 'T00:00:00');
            const dayOfWeek = selectedDate.getDay(); // 0 = Domingo, 6 = Sábado
            const timeSelect = document.getElementById('time');
            
            // Limpiar opciones anteriores
            timeSelect.innerHTML = '<option value="">-- Selecciona hora --</option>';
            
            // Verificar si es domingo (cerrado)
            if (dayOfWeek === 0) {
                timeSelect.innerHTML = '<option value="">❌ Cerrado los domingos</option>';
                timeSelect.disabled = true;
                return;
            }
            
            // Habilitar selector
            timeSelect.disabled = false;
            
            // Determinar qué horarios usar
            const availableHours = dayOfWeek === 6 ? saturdayHours : weekdayHours;
            
            // Agregar opciones de hora
            availableHours.forEach(hour => {
                const option = document.createElement('option');
                option.value = hour;
                option.textContent = hour;
                timeSelect.appendChild(option);
            });
        });
        
        // Función para mostrar mensajes
        function showMessage(message, type) {
            messageBox.textContent = message;
            messageBox.className = `message-box ${type} show`;
            messageBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // Función para resetear el botón
        function resetButton() {
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            submitBtn.querySelector('.btn-text').textContent = 'Enviar Solicitud';
        }
        
        // Manejar envío del formulario
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Deshabilitar botón y mostrar loading
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.querySelector('.btn-text').textContent = 'Enviando...';
            messageBox.classList.remove('show');
            
            // Recoger datos del formulario
            const formData = {
                client_name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                service: document.getElementById('service').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value
            };
            
            try {
                // Enviar datos al Google Apps Script
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    redirect: 'follow',
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(formData)
                });
                
                // Verificar respuesta
                const result = await response.json();
                
                if (result.success) {
                    showMessage('¡Solicitud enviada correctamente! Te contactaremos pronto para confirmar tu cita.', 'success');
                } else {
                    showMessage('Error al enviar: ' + (result.error || 'Intenta de nuevo'), 'error');
                }
                
                // Resetear formulario
                form.reset();
                servicePriceDiv.style.display = 'none';
                
                // Opcional: Redirigir a WhatsApp después de 3 segundos
                setTimeout(() => {
                    const whatsappMsg = `Hola BeautyBox! Acabo de enviar una solicitud de cita para ${formData.service} el ${formData.date} a las ${formData.time}. Mi nombre es ${formData.client_name}.`;
                    const whatsappURL = `https://wa.me/34642841932?text=${encodeURIComponent(whatsappMsg)}`;
                    
                    if (confirm('¿Quieres confirmar tu cita ahora por WhatsApp?')) {
                        window.open(whatsappURL, '_blank');
                    }
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Hubo un error al enviar tu solicitud. Por favor, intenta de nuevo o contáctanos por WhatsApp.', 'error');
            } finally {
                resetButton();
            }
        });
        
        // Validación de teléfono
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            // Permitir solo números, espacios y guiones
            this.value = this.value.replace(/[^\d\s\-+]/g, '');
        });
    </script>
</body>
</html>
